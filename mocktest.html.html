NISM Series 7 – Mock Test
</div>

<div id="progressBar" style="height:10px;width:0%;background:#27ae60;border-radius:6px;"></div>
</div>

<div id="stats" style="margin-bottom:15px;font-weight:bold;"></div>

<form id="testForm"></form>

<button class="submit-btn" onclick="submitTest()">Submit Test</button>

<script>

let timerInterval;
let timeLeft = 60*60;
let currentSet = 1;

function startTest(set){

currentSet = set;

document.getElementById("home").style.display="none";
document.getElementById("exam").style.display="block";

loadQuestions(set);

startTimer();
}

function startTimer(){

timeLeft = 60*60;

timerInterval = setInterval(function(){

let m = Math.floor(timeLeft/60);
let s = timeLeft%60;

document.getElementById("timer").innerHTML =
"Time Left: "+m+":"+(s<10?"0":"")+s;

timeLeft--;

if(timeLeft<0){
clearInterval(timerInterval);
submitTest();
}

},1000);
}

function updateProgress(){

let total = questionBank[currentSet].length;

let answered =
document.querySelectorAll('input[type="radio"]:checked').length;

let percent = (answered/total)*100;

document.getElementById("progressBar").style.width = percent+"%";

document.getElementById("stats").innerHTML =
"Answered: "+answered+" / "+total;

}

function loadQuestions(set){

let form = document.getElementById("testForm");
form.innerHTML="";

let qs = questionBank[set];

for(let i=0;i<qs.length;i++){

let qDiv = document.createElement("div");
qDiv.className="question";

qDiv.innerHTML="<p>"+(i+1)+". "+qs[i].question+"</p>";

qs[i].options.forEach((opt,index)=>{

let letter = ["A","B","C","D"][index];

qDiv.innerHTML+=
`<label>
<input type="radio" name="q${i}" value="${letter}" onclick="updateProgress()">
${letter}. ${opt}
</label>`;

});

form.appendChild(qDiv);

}

}

function submitTest(){

clearInterval(timerInterval);

let score = 0;

let total = answers[currentSet].length;

for(let i=0;i<total;i++){

let correct = answers[currentSet][i];

let selected =
document.querySelector('input[name="q'+i+'"]:checked');

let options =
document.querySelectorAll('input[name="q'+i+'"]');

options.forEach(opt=>{

let label = opt.parentElement;

if(opt.value === correct){
label.style.color="green";
label.style.fontWeight="bold";
}

if(selected && opt.value === selected.value && selected.value!==correct){
label.style.color="red";
label.style.fontWeight="bold";
}

});

if(selected && selected.value===correct){
score++;
}

}

document.getElementById("result").innerHTML =
"Your Score: "+score+" / "+total;

}
